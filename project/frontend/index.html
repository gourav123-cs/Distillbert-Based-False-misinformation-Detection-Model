<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake News Detection System</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Title -->
    <header class="header">
      <h1 class="title">Fake News Detection System</h1>
      <p class="subtitle">Enter text below to analyze.</p>
    </header>

    <!-- Input area -->
    <main class="main">
      <div class="input-wrapper">
        <label for="text-input" class="sr-only">Enter news text to analyze</label>
        <input
          type="text"
          id="text-input"
          class="search-input"
          placeholder="Paste headline or article text here..."
          autocomplete="off"
        />
      </div>

      <button type="button" id="predict-btn" class="predict-btn" aria-label="Run prediction">
        Predict
      </button>

      <!-- Loading spinner (hidden by default) -->
      <div id="loading" class="loading" aria-hidden="true">
        <div class="spinner"></div>
        <span class="loading-text">Analyzing...</span>
      </div>

      <!-- Result card -->
      <div id="result-card" class="result-card result-card--hidden">
        <span class="result-label">Prediction:</span>
        <span id="result-value" class="result-value">Result will appear here</span>
      </div>
    </main>

    <footer class="footer">
      <p>Project for DistilBERT integration for Fake News Detection.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
